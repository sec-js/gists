<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">Markdown renderer feature coverage</title>
  <desc id="desc">A simple bar chart showing coverage for text, citations, math, code, tables, and assets.</desc>
  <rect width="760" height="320" rx="18" fill="#f8f8f8"/>
  <g fill="none" stroke="#dbdbdb" stroke-width="1">
    <path d="M82 248h620"/>
    <path d="M82 198h620"/>
    <path d="M82 148h620"/>
    <path d="M82 98h620"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6f6f6f">
    <text x="82" y="276">Text</text>
    <text x="179" y="276">Cites</text>
    <text x="276" y="276">Math</text>
    <text x="373" y="276">Code</text>
    <text x="470" y="276">Tables</text>
    <text x="567" y="276">Assets</text>
  </g>
  <g>
    <rect x="86" y="92" width="52" height="156" rx="6" fill="#034cff"/>
    <rect x="183" y="118" width="52" height="130" rx="6" fill="#a753ae"/>
    <rect x="280" y="108" width="52" height="140" rx="6" fill="#007b80"/>
    <rect x="377" y="82" width="52" height="166" rx="6" fill="#00ceb9"/>
    <rect x="474" y="132" width="52" height="116" rx="6" fill="#8a6f00"/>
    <rect x="571" y="104" width="52" height="144" rx="6" fill="#ff8c00"/>
  </g>
  <text x="82" y="50" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#171717">Single-file Markdown feature coverage</text>
  <text x="82" y="74" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6f6f6f">This SVG is referenced as a local asset and inlined during bundling.</text>
</svg>

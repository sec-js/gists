<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
</head>
<body>
<div id="slide" style="width:1280px; height:720px; box-sizing:border-box; font-family:'Microsoft YaHei';
            display:flex; flex-direction:column; padding:60px 80px;
            background:#FFFFFF;">
  <h1 style="font-size:28px; color:#003A70; font-weight:bold; margin-bottom:24px;">
    AI方案在各项指标上全面超越传统方法
  </h1>
  <table style="width:100%; border-collapse:collapse; font-size:16px;">
    <tr style="background:#003A70;">
      <th style="padding:14px 20px; text-align:left; color:#FFFFFF; font-weight:bold;">指标</th>
      <th style="padding:14px 20px; text-align:center; color:#FFFFFF; font-weight:bold;">传统人工</th>
      <th style="padding:14px 20px; text-align:center; color:#FFFFFF; font-weight:bold;">AI检测</th>
      <th style="padding:14px 20px; text-align:center; color:#FFFFFF; font-weight:bold;">提升幅度</th>
    </tr>
    <tr style="background:#F2F4F7;">
      <td style="padding:12px 20px; color:#1A1A2E;">检测速度</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">45秒/件</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">0.3秒/件</td>
      <td style="padding:12px 20px; color:#0078D4; text-align:center; font-weight:bold;">150x</td>
    </tr>
    <tr style="background:#FFFFFF;">
      <td style="padding:12px 20px; color:#1A1A2E;">检测精度</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">88%</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">99.2%</td>
      <td style="padding:12px 20px; color:#0078D4; text-align:center; font-weight:bold;">+11.2%</td>
    </tr>
    <tr style="background:#F2F4F7;">
      <td style="padding:12px 20px; color:#1A1A2E;">漏检率</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">12%</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">0.5%</td>
      <td style="padding:12px 20px; color:#0078D4; text-align:center; font-weight:bold;">-96%</td>
    </tr>
    <tr style="background:#FFFFFF;">
      <td style="padding:12px 20px; color:#1A1A2E;">年运营成本</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">80万元</td>
      <td style="padding:12px 20px; color:#1A1A2E; text-align:center;">15万元</td>
      <td style="padding:12px 20px; color:#0078D4; text-align:center; font-weight:bold;">-81%</td>
    </tr>
  </table>
  <p style="font-size:13px; color:#5A6A7A; margin-top:auto;">
    注：AI检测成本包含硬件折旧与模型维护费用
  </p>
</div>

</html>

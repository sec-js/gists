<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
</head>
<body>
<div id="slide" style="width:1280px; height:720px; box-sizing:border-box; font-family:'Microsoft YaHei';
            display:flex; flex-direction:column; padding:60px 80px;
            background:#FFFFFF;">
  <h1 style="font-size:28px; color:#003A70; font-weight:bold; margin-bottom:8px;">
    实施路径分四个阶段推进
  </h1>
  <h3 style="font-size:18px; color:#5A6A7A; font-weight:normal; margin-bottom:28px;">
    每阶段设立明确交付物与验收标准
  </h3>
  <ol style="font-size:17px; color:#1A1A2E; line-height:2.2; padding-left:28px;">
    <li>需求分析与数据采集（第1-2周）：完成<span style="color:#0078D4;">产线调研</span>、样本采集与标注规范制定</li>
    <li>模型开发与训练（第3-6周）：搭建深度学习模型，完成<i>迭代训练</i>与优化</li>
    <li>系统集成与测试（第7-8周）：部署到<b>产线环境</b>，完成端到端联调</li>
    <li>试运行与验收（第9-10周）：并行运行两周，达标后<u>正式上线</u></li>
  </ol>
  <div style="display:flex; gap:16px; margin-top:auto;">
    <div style="flex:1; height:6px; background:#0078D4; border-radius:3px;"></div>
    <div style="flex:1; height:6px; background:#00A3E0; border-radius:3px;"></div>
    <div style="flex:1; height:6px; background:#D4A843; border-radius:3px;"></div>
    <div style="flex:1; height:6px; background:#003A70; border-radius:3px;"></div>
  </div>
</div>
</body>
</html>

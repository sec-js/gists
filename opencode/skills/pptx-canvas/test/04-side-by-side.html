<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
</head>
<body>
<div id="slide" style="width:1280px; height:720px; box-sizing:border-box; font-family:'Microsoft YaHei';
            display:flex; flex-direction:column; padding:60px 80px;
            background:#FFFFFF;">
  <h1 style="font-size:28px; color:#003A70; font-weight:bold; margin-bottom:32px;">
    云端部署在灵活性和成本上优于本地方案
  </h1>
  <div style="display:flex; gap:40px; flex:1;">
    <div style="flex:1; display:flex; flex-direction:column; background:#F2F4F7;
                border-radius:8px; padding:24px;">
      <h2 style="font-size:22px; color:#003A70; margin-bottom:16px;">本地部署</h2>
      <ul style="font-size:15px; color:#1A1A2E; line-height:1.8; padding-left:20px;">
        <li>一次性硬件投入<b>200万+</b></li>
        <li>需专职运维团队</li>
        <li>算力扩展受物理限制</li>
        <li>数据安全性高</li>
      </ul>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; background:#F2F4F7;
                border-radius:8px; padding:24px;">
      <h2 style="font-size:22px; color:#003A70; margin-bottom:16px;">云端部署</h2>
      <ul style="font-size:15px; color:#1A1A2E; line-height:1.8; padding-left:20px;">
        <li>按需付费，初期投入<b>仅需10万</b></li>
        <li>免运维，供应商负责</li>
        <li>弹性扩展，分钟级响应</li>
        <li>需加密传输保障安全</li>
      </ul>
    </div>
  </div>
  <p style="font-size:15px; color:#003A70; margin-top:24px; padding-top:16px;
            border-top:2px solid #C8D1DC; font-weight:bold;">
    建议：产线数据量波动大的企业优先选择云端方案，可节省60%以上初期投入
  </p>
</div>
</body>
</html>

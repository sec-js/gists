<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
</head>
<body>
<div id="slide" style="width:1280px; height:720px; box-sizing:border-box; font-family:'Microsoft YaHei';
            display:flex; flex-direction:column; padding:60px 80px;
            background:#FFFFFF;">
  <h1 style="font-size:28px; color:#003A70; font-weight:bold; margin-bottom:32px;">
    传统检测方法面临三大核心挑战
  </h1>
  <ul style="font-size:18px; color:#1A1A2E; line-height:2.0; padding-left:28px;">
    <li>人工检测<b>速度慢</b>，每件产品平均耗时45秒，无法满足产线节拍要求</li>
    <li>检测精度受<i>操作人员经验</i>和疲劳程度影响，漏检率高达<span style="color:#CE0E2D; font-weight:bold;">12%</span></li>
    <li>缺陷分类依赖主观判断，<u>标准不统一</u>导致质量数据可信度低</li>
    <li>人力成本持续上升，单线年检测人力成本超过<span style="color:#0078D4;">80万元</span></li>
  </ul>
  <p style="font-size:13px; color:#5A6A7A; margin-top:auto;">
    数据来源：2024年制造业质量管理白皮书
  </p>
</div>
</body>
</html>

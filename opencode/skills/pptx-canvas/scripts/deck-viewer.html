<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slide Deck Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; touch-action: pan-y; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #stage {
    position: relative;
    width: 1280px;
    height: 720px;
    transform-origin: top left;
    background: #000;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }

  #stage iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1280px;
    height: 720px;
    border: none;
    display: none;
    /* Clicks/touches pass through to nav zones. This prevents the iframe
       from stealing keyboard focus (which would break arrow-key navigation)
       and makes touch swipe work without fighting iframe scrolling. */
    pointer-events: none;
  }

  #stage iframe.active { display: block; }

  #counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    user-select: none;
    opacity: 0.7;
    transition: opacity 0.2s;
    z-index: 100;
  }
  #counter:hover { opacity: 1; }

  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 15%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left  .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  /* Print mode: hide the interactive viewer, show the pre-loaded print-stack
     iframes in a vertical flow with page breaks. The !important overrides are
     needed because the pre-loaded iframes use inline styles (position:absolute,
     left:-9999px) to stay offscreen during normal viewing. Ctrl+P / Cmd+P
     produces a multi-page PDF with one slide per page. */
  @media print {
    @page { size: 1280px 720px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage, .nav-zone, #counter { display: none !important; }
    #print-stack { display: block !important; }
    #print-stack iframe {
      position: static !important;
      left: auto !important;
      width: 1280px !important;
      height: 720px !important;
      page-break-after: always;
      display: block !important;
      border: none;
      pointer-events: auto;
    }
  }
</style>
</head>
<body>

<div id="stage"></div>
<div class="nav-zone left" id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div id="counter"></div>
<div id="print-stack" style="display:none;"></div>

<!-- Slide list. The agent copies this file into the workspace and replaces
     the JSON array with the actual slide filenames, e.g. ["01-title.html",
     "02-agenda.html", ...]. The script reads from this element. -->
<script type="application/json" id="slide-list">[]</script>

<script>
const slides = JSON.parse(document.getElementById('slide-list').textContent || '[]');

let current = 0;
const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const printStack = document.getElementById('print-stack');
const iframes = [];

slides.forEach((src, i) => {
  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.loading = i < 2 ? 'eager' : 'lazy';
  if (i === 0) iframe.classList.add('active');
  stage.appendChild(iframe);
  iframes.push(iframe);
});

// Pre-load all slides offscreen for print. Creating iframes in beforeprint
// doesn't work because the browser renders the print layout immediately
// before new iframes have loaded (resulting in blank pages).
slides.forEach(src => {
  const f = document.createElement('iframe');
  f.src = src;
  f.style.cssText = 'position:absolute;left:-9999px;width:1280px;height:720px;border:none;';
  printStack.appendChild(f);
});

function show(index) {
  if (index < 0 || index >= slides.length) return;
  iframes[current].classList.remove('active');
  current = index;
  iframes[current].classList.add('active');
  counter.textContent = (current + 1) + ' / ' + slides.length;
}

function rescale() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  const scale = Math.min(ww / 1280, wh / 720);
  const x = (ww - 1280 * scale) / 2;
  const y = (wh - 720 * scale) / 2;
  stage.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + scale + ')';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); show(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')    { e.preventDefault(); show(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); show(0); }
  if (e.key === 'End')  { e.preventDefault(); show(slides.length - 1); }
});

document.getElementById('navL').addEventListener('click', () => show(current - 1));
document.getElementById('navR').addEventListener('click', () => show(current + 1));

// Touch/swipe navigation. Tracks by touch identifier to avoid
// multi-finger gestures corrupting the swipe direction.
let touchId = null;
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchId = e.touches[0].identifier;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId);
  if (!touch) return;
  touchId = null;
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;
  if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
  if (dx < 0) show(current + 1);
  else show(current - 1);
}, { passive: true });

window.addEventListener('resize', rescale);

rescale();
show(0);
</script>
</body>
</html>
